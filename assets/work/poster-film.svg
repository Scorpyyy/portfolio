<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" font-family="Georgia, serif">
  <defs>
    <radialGradient id="sky" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#2a2438"/><stop offset="1" stop-color="#08070d"/>
    </radialGradient>
    <linearGradient id="ecl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a3d"/><stop offset="1" stop-color="#c81d4e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1200" fill="url(#sky)"/>
  <!-- stars -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="120" cy="160" r="2"/><circle cx="300" cy="120" r="1.5"/><circle cx="640" cy="150" r="2"/><circle cx="780" cy="220" r="1.5"/>
    <circle cx="200" cy="300" r="1.5"/><circle cx="720" cy="360" r="2"/><circle cx="500" cy="120" r="1.5"/><circle cx="820" cy="120" r="1.5"/>
  </g>
  <!-- eclipse -->
  <circle cx="450" cy="430" r="200" fill="url(#ecl)"/>
  <circle cx="450" cy="430" r="200" fill="#08070d"/>
  <circle cx="450" cy="430" r="200" fill="none" stroke="url(#ecl)" stroke-width="10"/>
  <circle cx="450" cy="430" r="215" fill="none" stroke="#ff8a3d" stroke-width="1.5" opacity="0.4"/>
  <!-- title -->
  <text x="450" y="760" text-anchor="middle" font-size="120" fill="#ffffff" letter-spacing="14">ÉCLIPSE</text>
  <text x="450" y="815" text-anchor="middle" font-size="20" fill="#ff9a4d" letter-spacing="16" font-family="Arial">A FILM BY L. MERINO</text>
  <!-- credits block -->
  <text x="450" y="960" text-anchor="middle" font-size="15" fill="#cfc9d8" font-family="Arial" letter-spacing="1">MARISOL VEGA   ADAM REYES   NINA OKONKWO</text>
  <text x="450" y="990" text-anchor="middle" font-size="12" fill="#8b8598" font-family="Arial" letter-spacing="1">MUSIC BY H. SARR · DIRECTOR OF PHOTOGRAPHY J. LIND · PRODUCED BY ATLAS FILMS</text>
  <rect x="250" y="1030" width="400" height="1" fill="#4a4458"/>
  <text x="450" y="1090" text-anchor="middle" font-size="34" fill="#ffffff" letter-spacing="6">IN CINEMAS</text>
  <text x="450" y="1135" text-anchor="middle" font-size="24" fill="#ff8a3d" letter-spacing="8" font-family="Arial">NOVEMBER 2025</text>
</svg>
