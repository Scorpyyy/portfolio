  <text x="82" y="460" font-size="17" fill="#6b6152" font-family="Arial">Seasonal cuisine crafted with love, served in the</text>
  <text x="82" y="486" font-size="17" fill="#6b6152" font-family="Arial">heart of the old town.</text>
