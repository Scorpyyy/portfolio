      <stop offset="0" stop-color="#1b0f3a"/><stop offset="1" stop-color="#070510"/>
    </radialGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f5d4"/><stop offset="0.5" stop-color="#8338ec"/><stop offset="1" stop-color="#ff006e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1200" fill="url(#pg)"/>
  <!-- concentric neon rings -->
  <g fill="none" stroke-width="3">
